<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>거리 측정 도구 (비율 정밀 조정)</title>
    <style>
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.5); background-color: #444; touch-action: none; border: 1px solid #666; }
        #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; z-index: 10; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">마우스나 터치로 드래그 해보세요!</div>
    <canvas id="mapCanvas"></canvas>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');
        const img = new Image();

        img.src = 'map_image.png';

        let isDrawing = false;
        let startX, startY;
        let scaleFactor = 1;

        function initCanvas() {
            const padding = 20;
            const winW = window.innerWidth - padding;
            const winH = window.innerHeight - padding;
            
            if (img.complete && img.width > 0) {
                const ratio = Math.min(winW / img.width, winH / img.height);
                canvas.width = img.width * ratio;
                canvas.height = img.height * ratio;
                scaleFactor = ratio;
                info.innerHTML = "지도 로드 완료!<br>드래그해서 거리를 재보세요.";
            } else {
                canvas.width = winW;
                canvas.height = winH;
                scaleFactor = 1;
                info.innerHTML = "<span style='color: #ff9999;'>이미지를 불러올 수 없습니다.</span><br>파일명을 확인해주세요.";
            }
            render();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.complete && img.width > 0) {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.strokeStyle = "#555";
                for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
                for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
            }
        }

        function getDistanceText(px) {
            // 297m -> 200m 조정을 위해 계수를 0.639로 세팅
            const originalPx = px / scaleFactor;
            const meters = Math.floor(originalPx * 0.639); 
            
            if (meters < 1000) return `${meters} m`;
            return `${Math.floor(meters / 1000)} km ${meters % 1000} m`;
        }

        function getEventPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        const startAction = (e) => {
            isDrawing = true;
            const pos = getEventPos(e);
            startX = pos.x; startY = pos.y;
        };

        const moveAction = (e) => {
            if (!isDrawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getEventPos(e);
            render();
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = '#FFDC00';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            ctx.stroke();

            const dist = Math.sqrt((pos.x - startX)**2 + (pos.y - startY)**2);
            const distText = getDistanceText(dist);

            const fontSize = Math.max(35, canvas.width / 15);
            ctx.font = `bold ${fontSize}px sans-serif`;
            ctx.textAlign = "left";
            ctx.strokeStyle = 'black'; ctx.lineWidth = 5;
            ctx.strokeText(distText, pos.x + 15, pos.y - 15);
            ctx.fillStyle = 'white';
            ctx.fillText(distText, pos.x + 15, pos.y - 15);
        };

        const endAction = () => { isDrawing = false; };

        img.onload = initCanvas;
        img.onerror = initCanvas;
        window.addEventListener('load', initCanvas);
        window.addEventListener('resize', initCanvas);
        canvas.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        canvas.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchmove', moveAction, {passive: false});
        window.addEventListener('touchend', endAction);
    </script>
</body>
</html>
